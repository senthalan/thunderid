receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 1s
    send_batch_size: 1024

exporters:
  # Export to Data Prepper (OpenSearch)
  otlp/dataprepper:
    endpoint: data-prepper:21890
    tls:
      insecure: true

  # Debug exporter for logging to console
  debug:
    verbosity: normal

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/dataprepper, debug]
