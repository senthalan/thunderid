id: 03fd244a-9671-4556-8fa6-eba39170b173
name: Basic + Google + GitHub Registration Flow
handle: basic-google-github-flow
flowType: REGISTRATION
nodes:
  - id: start
    type: START
    onSuccess: user_type_resolver
  - id: user_type_resolver
    type: TASK_EXECUTION
    executor:
      name: UserTypeResolver
    onSuccess: choose_auth
  - id: choose_auth
    type: PROMPT
    actions:
      - ref: action_001
        nextNode: basic_auth
      - ref: action_002
        nextNode: google_auth
      - ref: action_003
        nextNode: github_auth
  - id: basic_auth
    type: TASK_EXECUTION
    executor:
      name: BasicAuthExecutor
    onSuccess: provisioning
  - id: google_auth
    type: TASK_EXECUTION
    properties:
      idpId: 456efc02-bad3-47bb-bd87-01cc94f8388c
    executor:
      name: GoogleOIDCAuthExecutor
    onSuccess: provisioning
  - id: github_auth
    type: TASK_EXECUTION
    properties:
      idpId: 372a20db-a946-4b40-add0-0049d15a5f9c
    executor:
      name: GithubOAuthExecutor
    onSuccess: provisioning
  - id: provisioning
    type: TASK_EXECUTION
    executor:
      name: ProvisioningExecutor
    onSuccess: auth_assert
  - id: auth_assert
    type: TASK_EXECUTION
    executor:
      name: AuthAssertExecutor
    onSuccess: end
  - id: end
    type: END
